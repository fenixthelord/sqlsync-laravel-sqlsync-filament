name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: PHP ${{ matrix.php }} — Laravel ${{ matrix.laravel }} — Filament ${{ matrix.filament }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.2'
            laravel: '^12.0'
            filament: '^4.0'
            testbench: '^10.0'
          - php: '8.3'
            laravel: '^12.0'
            filament: '^5.0'
            testbench: '^10.0'
          - php: '8.3'
            laravel: '^13.0'
            filament: '^5.0'
            testbench: '^11.0'
          - php: '8.4'
            laravel: '^13.0'
            filament: '^5.0'
            testbench: '^11.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Install dependencies
        run: |
          composer require \
            "laravel/framework:${{ matrix.laravel }}" \
            "filament/filament:${{ matrix.filament }}" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            --no-interaction --no-update
          composer update --prefer-stable --no-interaction

      - name: Validate composer.json
        run: composer validate --strict

      - name: Check PHP syntax
        run: find src config -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Run tests
        run: vendor/bin/pest --ci

      - name: Check code style
        run: vendor/bin/pint --test
